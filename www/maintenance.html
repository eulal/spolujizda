<!DOCTYPE html>
<html lang="cs">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Probíhá údržba – Spolujízda</title>
	<style>
		/* latin-ext */
		@font-face {
			font-family: 'Inter';
			font-style: normal;
			font-weight: 100 900;
			font-display: swap;
			src: url('./fonts/Inter-latin-ext.woff2') format('woff2');
			unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;
		}
		/* latin */
		@font-face {
			font-family: 'Inter';
			font-style: normal;
			font-weight: 100 900;
			font-display: swap;
			src: url('./fonts/Inter-latin.woff2') format('woff2');
			unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
		}

		:root {
			--primary: #2563eb;
			--bg: #f8fafc;
		}

		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}

		body {
			font-family: 'Inter', system-ui, sans-serif;
			background: var(--bg);
			min-height: 100vh;
			display: flex;
			align-items: center;
			justify-content: center;
			padding: 2rem;
		}

		.maintenance-card {
			background: white;
			border-radius: 1rem;
			box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
			padding: 3rem 2.5rem;
			max-width: 500px;
			text-align: center;
		}

		.maintenance-icon {
			font-size: 4rem;
			margin-bottom: 1.5rem;
			display: block;
			animation: spin 3s linear infinite;
		}

		@keyframes spin {
			0% { transform: rotate(0deg); }
			100% { transform: rotate(360deg); }
		}

		h1 {
			font-size: 1.5rem;
			font-weight: 700;
			color: #1e293b;
			margin-bottom: 0.75rem;
		}

		p {
			color: #64748b;
			line-height: 1.6;
			font-size: 1rem;
		}

		.refresh-hint {
			margin-top: 2rem;
			font-size: 0.875rem;
			color: #94a3b8;
		}
	</style>
</head>
<body>
	<div class="maintenance-card">
		<span class="maintenance-icon">⚙️</span>
		<h1>Probíhá údržba</h1>
		<p>
			Právě probíhá aktualizace aplikace Spolujízda.
			Stránka bude opět dostupná za několik okamžiků.
		</p>
		<p class="refresh-hint">
			Stránka se automaticky obnoví za <span id="countdown">30</span> sekund.
		</p>
	</div>

	<script>
		let seconds = 30;
		const countdown = document.getElementById('countdown');
		setInterval(() => {
			seconds--;
			countdown.textContent = seconds;
			if (seconds <= 0) {
				window.location.reload();
			}
		}, 1000);
	</script>
</body>
</html>
